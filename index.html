<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Real Chess Game</title>

<!-- Chessboard UI -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chessboardjs@1.0.0/www/css/chessboard.min.css">

<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: Arial;
  }
  #board {
    width: 320px;
    margin-top: 20px;
  }
</style>
</head>

<body>

<h2>Real Chess Game ♟️</h2>
<div id="board"></div>

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/chess.js@1.0.0/chess.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chessboardjs@1.0.0/www/js/chessboard.min.js"></script>

<script>
const game = new Chess();

const board = Chessboard('board', {
  draggable: true,
  position: 'start',

  onDragStart: function (source, piece) {
    if (game.game_over()) return false;

    // Only allow current player's pieces
    if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
        (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
      return false;
    }
  },

  onDrop: function (source, target) {
    const move = game.move({
      from: source,
      to: target,
      promotion: 'q' // auto queen
    });

    if (move === null) return 'snapback';

    updateStatus();
  },

  onSnapEnd: function () {
    board.position(game.fen());
  }
});

function updateStatus() {
  if (game.in_checkmate()) {
    alert("Checkmate!");
  } else if (game.in_draw()) {
    alert("Draw!");
  } else if (game.in_check()) {
    console.log("Check!");
  }
}
</script>

</body>
</html>

q<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chess Game</title>

<!-- STYLE (CSS) -->
<link rel="stylesheet" href="https://unpkg.com/chessboardjs@1.0.0/www/css/chessboard.min.css">

<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: Arial;
    background: #222;
    color: white;
  }

  h2 {
    margin-top: 20px;
  }

  #board {
    width: 320px;
    margin-top: 20px;
  }

  #status {
    margin-top: 15px;
    font-size: 18px;
  }

  button {
    margin-top: 10px;
    padding: 8px 15px;
    border: none;
    background: #4CAF50;
    color: white;
    border-radius: 5px;
    cursor: pointer;
  }
</style>
</head>

<body>

<h2>Chess Game ♟️</h2>
<div id="board"></div>
<div id="status"></div>
<button onclick="resetGame()">Restart Game</button>

<!-- SCRIPT (JS) -->
<script src="https://unpkg.com/chess.js@latest/chess.js"></script>
<script src="https://unpkg.com/chessboardjs@1.0.0/www/js/chessboard.min.js"></script>

<script>
const game = new Chess();
const statusEl = document.getElementById("status");

const board = Chessboard('board', {
  draggable: true,
  position: 'start',

  onDragStart: function (source, piece) {
    if (game.isGameOver()) return false;

    // Allow only current player's turn
    if ((game.turn() === 'w' && piece.startsWith('b')) ||
        (game.turn() === 'b' && piece.startsWith('w'))) {
      return false;
    }
  },

  onDrop: function (source, target) {
    const move = game.move({
      from: source,
      to: target,
      promotion: 'q'
    });

    if (move === null) return 'snapback';

    updateStatus();
  },

  onSnapEnd: function () {
    board.position(game.fen());
  }
});

function updateStatus() {
  let status = "";

  if (game.isCheckmate()) {
    status = "Checkmate! " + (game.turn() === 'w' ? "Black wins" : "White wins");
  } else if (game.isDraw()) {
    status = "Draw!";
  } else {
    status = (game.turn() === 'w' ? "White" : "Black") + " turn";

    if (game.isCheck()) {
      status += " (Check!)";
    }
  }

  statusEl.innerText = status;
}

function resetGame() {
  game.reset();
  board.start();
  updateStatus();
}

// Start status
updateStatus();
</script>

</body>
</html>
